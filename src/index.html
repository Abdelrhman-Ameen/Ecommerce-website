<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wear Your Confidence — Vellora</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Wear Your Confidence with Vellora. Discover fashion, accessories, home pieces, and everyday essentials.">
  <meta name="theme-color" content="#101010">
  <script>
    (() => {
      const savedTheme = localStorage.getItem('ma3rad-theme');
      const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <link rel="icon" type="image/png" href="/assets/brand/vellora-logo.png">
</head>
<body>
  <app-root></app-root>
</body>
</html>
